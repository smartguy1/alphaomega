# AlphaOmega — Docker Compose
# Phase 1: Core pipeline only
# Phase 4 will add the Ollama LLM service

version: "3.8"

services:
  alphaomega:
    build: .
    volumes:
      - ./profiles:/app/profiles
      - ./db:/app/db
      - ./reference:/app/reference
      - ./data:/app/data
      - ./output:/app/output
      - ./config:/app/config
      - ./templates:/app/templates
    environment:
      - ALPHAOMEGA_CONFIG=/app/config/default_config.yaml
